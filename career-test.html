<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 직업 나침반</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card: #1e1e24;
    --accent: #c8a96e;
    --accent2: #7c6aff;
    --text: #e8e6df;
    --muted: #6b6875;
    --border: #2a2a32;
    --gold-glow: rgba(200, 169, 110, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,106,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(200,169,110,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.8s ease both;
  }

  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 16px;
  }

  .header h1 span {
    color: var(--accent);
    position: relative;
  }

  .header p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .question-number {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .question-text {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(17px, 3vw, 21px);
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 32px;
    font-weight: 700;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 15px;
    color: var(--text);
    font-weight: 300;
    line-height: 1.5;
    text-align: left;
  }

  .option:hover {
    border-color: var(--accent);
    background: var(--gold-glow);
    transform: translateX(4px);
  }

  .option.selected {
    border-color: var(--accent);
    background: var(--gold-glow);
    color: var(--accent);
  }

  .option-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .option.selected .option-dot {
    border-color: var(--accent);
    background: var(--accent);
  }

  .option.selected .option-dot::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--bg);
  }

  /* Navigation */
  .nav {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .btn {
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #e8c87a);
    color: #0d0d0f;
    flex: 1;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200, 169, 110, 0.3);
  }

  .btn-primary:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: var(--card);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 14px 20px;
  }

  .btn-secondary:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* Result */
  .result-wrap {
    animation: fadeUp 0.7s ease both;
  }

  .result-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .result-header .badge {
    display: inline-block;
    background: var(--gold-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .result-header h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .result-content {
    font-size: 16px;
    line-height: 1.9;
    color: var(--text);
    font-weight: 300;
    white-space: pre-wrap;
  }

  .result-content strong {
    color: var(--accent);
    font-weight: 700;
  }

  /* Loading */
  .loading-wrap {
    text-align: center;
    padding: 60px 20px;
  }

  .compass {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    animation: spin 3s linear infinite;
  }

  .compass svg {
    width: 100%;
    height: 100%;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .loading-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Typing cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Restart */
  .restart-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s ease;
  }

  .restart-btn:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* Intro */
  .intro-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    animation: fadeUp 0.7s ease both;
    position: relative;
    overflow: hidden;
  }

  .intro-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .intro-icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
  }

  .intro-card h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
  }

  .intro-card p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .traits-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 32px;
  }

  .trait-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .trait-item span {
    display: block;
    font-size: 20px;
    margin-bottom: 4px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }

  /* Error */
  .error-msg {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.2);
    color: #ff8080;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    margin-top: 12px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="eyebrow">AI 성향 기반 직업 추천</div>
    <h1>나의 직업<br><span>나침반</span></h1>
    <p>10가지 질문으로 당신의 성향을 분석하고<br>가장 잘 맞는 직업을 찾아드립니다</p>
  </div>

  <!-- Intro -->
  <div id="introSection">
    <div class="intro-card">
      <span class="intro-icon">🧭</span>
      <h2>당신에게 맞는 직업을 찾아드립니다</h2>
      <p>AI가 당신의 성향, 가치관, 업무 스타일을 분석하여<br>최적의 직업과 커리어 방향을 추천해 드립니다.</p>
      <div class="traits-grid">
        <div class="trait-item"><span>🧠</span>성격 분석</div>
        <div class="trait-item"><span>💡</span>강점 발견</div>
        <div class="trait-item"><span>🎯</span>직업 매칭</div>
        <div class="trait-item"><span>📈</span>성장 방향</div>
        <div class="trait-item"><span>🤝</span>협업 스타일</div>
        <div class="trait-item"><span>⚡</span>동기 파악</div>
      </div>
      <button class="btn btn-primary" onclick="startTest()" style="width:100%">검사 시작하기 →</button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quizSection" class="hidden">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progressLabel">질문 1 / 10</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNum">QUESTION 01</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>

    <div id="errorMsg" class="error-msg hidden"></div>

    <div class="nav">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← 이전</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>다음 →</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loadingSection" class="hidden">
    <div class="loading-wrap">
      <div class="compass">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="#2a2a32" stroke-width="2"/>
          <circle cx="32" cy="32" r="30" stroke="url(#grad)" stroke-width="2" stroke-dasharray="40 150" stroke-linecap="round"/>
          <polygon points="32,8 35,28 32,32 29,28" fill="#c8a96e"/>
          <polygon points="32,56 35,36 32,32 29,36" fill="#6b6875"/>
          <circle cx="32" cy="32" r="4" fill="#c8a96e"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#7c6aff"/>
              <stop offset="100%" stop-color="#c8a96e"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="loading-text">성향을 분석하는 중...</div>
      <div class="loading-sub">AI가 당신에게 맞는 직업을 찾고 있습니다</div>
    </div>
  </div>

  <!-- Result -->
  <div id="resultSection" class="hidden">
    <div class="result-wrap">
      <div class="result-header">
        <div class="badge">✦ 분석 완료</div>
        <h2>당신의 직업 나침반이<br>방향을 가리켰습니다</h2>
      </div>
      <div class="result-card">
        <div class="result-content" id="resultContent"></div>
      </div>
      <button class="restart-btn" onclick="restart()">↺ 다시 검사하기</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    text: "주말에 자유 시간이 생겼을 때, 당신은 보통 어떻게 보내나요?",
    options: [
      "혼자서 책을 읽거나 새로운 것을 배우며 시간을 보낸다",
      "친구들과 어울리며 대화하고 함께 활동한다",
      "창작 활동(그림, 글쓰기, 음악 등)을 즐긴다",
      "운동이나 야외 활동으로 에너지를 발산한다"
    ]
  },
  {
    text: "팀 프로젝트에서 당신이 자연스럽게 맡게 되는 역할은?",
    options: [
      "아이디어를 제시하고 전체 방향을 이끄는 리더",
      "세부 사항을 꼼꼼히 챙기고 실행하는 실무자",
      "갈등을 조율하고 팀 분위기를 만드는 중재자",
      "새로운 방법을 찾고 문제를 해결하는 분석가"
    ]
  },
  {
    text: "일을 할 때 가장 중요하게 생각하는 가치는?",
    options: [
      "안정성과 예측 가능한 환경",
      "창의성과 자유로운 표현",
      "사람들에게 기여하고 도움을 주는 것",
      "성취감과 높은 목표 달성"
    ]
  },
  {
    text: "문제에 직면했을 때 당신의 접근 방식은?",
    options: [
      "데이터와 논리를 바탕으로 체계적으로 분석한다",
      "직관과 경험을 믿고 빠르게 결정한다",
      "다른 사람의 의견을 듣고 함께 해결책을 찾는다",
      "창의적인 방법으로 새로운 해결책을 시도한다"
    ]
  },
  {
    text: "어떤 환경에서 가장 집중이 잘 되나요?",
    options: [
      "혼자 조용히 작업할 수 있는 공간",
      "사람들과 활발하게 소통하는 역동적인 환경",
      "명확한 규칙과 체계가 있는 구조화된 환경",
      "자유롭게 아이디어를 시도해볼 수 있는 유연한 환경"
    ]
  },
  {
    text: "당신이 가장 성취감을 느끼는 순간은?",
    options: [
      "복잡한 문제를 완벽하게 해결했을 때",
      "누군가의 삶에 긍정적인 영향을 미쳤을 때",
      "아이디어가 현실로 구현되어 결과물이 나왔을 때",
      "팀이나 조직을 성공으로 이끌었을 때"
    ]
  },
  {
    text: "새로운 정보를 배울 때 선호하는 방식은?",
    options: [
      "책이나 글을 통해 깊이 있게 공부한다",
      "직접 해보면서 경험으로 배운다",
      "강의나 수업을 통해 체계적으로 배운다",
      "다른 사람과 토론하며 함께 배운다"
    ]
  },
  {
    text: "미래에 대해 생각할 때 어떤 모습을 꿈꾸나요?",
    options: [
      "전문 분야에서 최고의 전문가로 인정받는 모습",
      "나만의 사업이나 프로젝트를 운영하는 모습",
      "사회에 의미 있는 변화를 만들어내는 모습",
      "창작물로 많은 사람에게 영감을 주는 모습"
    ]
  },
  {
    text: "스트레스를 받을 때 당신은 어떻게 반응하나요?",
    options: [
      "혼자만의 시간을 갖고 차분히 생각을 정리한다",
      "가까운 사람과 대화하며 감정을 나눈다",
      "운동이나 신체 활동으로 스트레스를 푼다",
      "다른 창작 활동이나 취미에 집중한다"
    ]
  },
  {
    text: "이상적인 직업을 고른다면 어떤 조건이 가장 중요한가요?",
    options: [
      "높은 보수와 사회적 인정",
      "일과 삶의 균형과 안정적인 생활",
      "하고 싶은 일을 자유롭게 할 수 있는 환경",
      "세상을 더 나은 곳으로 만드는 데 기여하는 일"
    ]
  }
];

let currentQ = 0;
let answers = [];

function startTest() {
  document.getElementById('introSection').classList.add('hidden');
  document.getElementById('quizSection').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById('progressLabel').textContent = `질문 ${currentQ + 1} / ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('questionNum').textContent = `QUESTION ${String(currentQ + 1).padStart(2, '0')}`;
  document.getElementById('questionText').textContent = q.text;

  const optWrap = document.getElementById('optionsWrap');
  optWrap.innerHTML = '';

  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[currentQ] === i ? ' selected' : '');
    div.innerHTML = `<div class="option-dot">${answers[currentQ] === i ? '<div style="width:8px;height:8px;border-radius:50%;background:#0d0d0f"></div>' : ''}</div><span>${opt}</span>`;
    div.onclick = () => selectOption(i);
    optWrap.appendChild(div);
  });

  document.getElementById('prevBtn').style.display = currentQ === 0 ? 'none' : '';
  document.getElementById('nextBtn').textContent = currentQ === total - 1 ? '결과 보기 ✦' : '다음 →';
  document.getElementById('nextBtn').disabled = answers[currentQ] === undefined;
  document.getElementById('errorMsg').classList.add('hidden');
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.className = 'option' + (i === idx ? ' selected' : '');
    const dot = el.querySelector('.option-dot');
    dot.innerHTML = i === idx ? '<div style="width:8px;height:8px;border-radius:50%;background:#0d0d0f"></div>' : '';
  });
  document.getElementById('nextBtn').disabled = false;
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function nextQuestion() {
  if (answers[currentQ] === undefined) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

async function showResult() {
  document.getElementById('quizSection').classList.add('hidden');
  document.getElementById('loadingSection').classList.remove('hidden');

  // Build answer summary
  const summary = questions.map((q, i) => {
    const ansIdx = answers[i] ?? 0;
    return `Q${i+1}. ${q.text}\n답변: ${q.options[ansIdx]}`;
  }).join('\n\n');

  const prompt = `당신은 전문 커리어 상담사입니다. 아래는 사용자의 성향 검사 결과입니다. 이를 바탕으로 맞춤형 직업 추천과 커리어 방향을 제시해 주세요.

[성향 검사 답변]
${summary}

다음 형식으로 답변해 주세요 (마크다운 없이 일반 텍스트로):

🎯 당신의 성향 유형
(2~3줄로 사용자의 핵심 성향 특징을 설명)

💼 추천 직업 TOP 5
1. [직업명] - [이 직업이 맞는 이유 한 줄]
2. [직업명] - [이유]
3. [직업명] - [이유]
4. [직업명] - [이유]
5. [직업명] - [이유]

⚡ 당신의 강점
(이 성향을 가진 사람의 핵심 강점 3가지를 간략히)

🌱 커리어 성장 방향
(2~3줄로 이 사람에게 맞는 커리어 개발 방향 조언)

따뜻하고 구체적으로, 사용자가 자신감을 가질 수 있게 작성해 주세요.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const resultText = data.content?.[0]?.text || "결과를 불러오는 데 실패했습니다.";

    document.getElementById('loadingSection').classList.add('hidden');
    document.getElementById('resultSection').classList.remove('hidden');

    // Typewriter effect
    const el = document.getElementById('resultContent');
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);

    let i = 0;
    const speed = 12;
    function type() {
      if (i < resultText.length) {
        el.insertBefore(document.createTextNode(resultText[i]), cursor);
        i++;
        setTimeout(type, speed);
      } else {
        cursor.remove();
      }
    }
    type();

  } catch (err) {
    document.getElementById('loadingSection').classList.add('hidden');
    document.getElementById('quizSection').classList.remove('hidden');
    const errEl = document.getElementById('errorMsg');
    errEl.textContent = 'AI 분석 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
    errEl.classList.remove('hidden');
  }
}

function restart() {
  currentQ = 0;
  answers = [];
  document.getElementById('resultSection').classList.add('hidden');
  document.getElementById('introSection').classList.remove('hidden');
}
</script>
</body>
</html>
